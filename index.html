    class SoundEffects {
      constructor() { this.ctx = null; this.muted = false; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      playCorrect() {
        if (this.muted) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
        osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.45);
        osc.start(); osc.stop(this.ctx.currentTime + 0.45);
      }
      playWrong() {
        if (this.muted) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.35);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
        osc.start(); osc.stop(this.ctx.currentTime + 0.4);
      }
      playCombo(comboCount) {
        if (this.muted) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'triangle'; const baseFreq = 440 + (comboCount * 30);
        osc.frequency.setValueAtTime(baseFreq, this.ctx.currentTime);
        osc.frequency.setValueAtTime(baseFreq * 1.5, this.ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
      }
      playTimeout() {
        if (this.muted) return; this.init();
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1046.50, this.ctx.currentTime + 1.0);

        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.2);
        osc.start(); osc.stop(this.ctx.currentTime + 1.2);
      }
    }

      // 구글 시트에서 수신한 실시간 랭킹 목록 (초기 데이터 비움 - 예시 유저 완벽 제거)
      const [sheetLeaderboard, setSheetLeaderboard] = useState([]);
      const [loadingRanking, setLoadingRanking] = useState(true);
      const [rankingTab, setRankingTab] = useState('correct'); // 'correct' (소수왕) 또는 'combo' (콤보왕)

      // 구글 시트 저장 상태 추적용 State ('idle' | 'saving' | 'success' | 'error')
      const [savingStatus, setSavingStatus] = useState('idle');

      const timerRef = useRef(null);
      const countdownRef = useRef(null);

      // 첫 화면 로딩 시 구글 시트로부터 실시간 데이터 로드
      useEffect(() => {
        if (screen === 'start') {
          fetchRankingFromSheet();
        }
      }, [screen]);

      const fetchRankingFromSheet = async () => {
        setLoadingRanking(true);
        try {
          const controller = new AbortController();
          const id = setTimeout(() => controller.abort(), 4000); 
          
          const res = await fetch(GOOGLE_SHEET_URL, { signal: controller.signal });
          clearTimeout(id);
          
          if (res.ok) {
            const data = await res.json();
            if (Array.isArray(data)) {
              setSheetLeaderboard(data);
              return;
            }
          }
          throw new Error("Invalid format received");
        } catch (err) {
          console.warn("스프레드시트 랭킹 수신 실패 또는 첫 사용 환경입니다.", err);
          // 네트워크 에러 혹은 기록 없음 시 예시데이터 없이 깨끗한 빈배열 유지
          setSheetLeaderboard([]);
        } finally {
          setLoadingRanking(false);
        }
      };

      useEffect(() => { sfx.muted = isMuted; }, [isMuted]);

      const startCountdown = () => {
        if (!grade || !classNum.trim() || !studentName.trim()) {
          alert("학년, 반, 이름을 모두 정확하게 입력해 주세요!");
          return;
        }
        setScreen('countdown');
        setCountdown(3);
        sfx.init();

        countdownRef.current = setInterval(() => {
          setCountdown((prev) => {
            if (prev === 1) {
              clearInterval(countdownRef.current);
              startGame();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      const startGame = () => {
        setScreen('play');
        setCurrentCombo(0);
        setMaxCombo(0);
        setTimeLeft(gameDuration); 
        setTotalQuestionsAnswered(0);
        setCorrectAnswersCount(0);
        setQuestionIndex(1);
        setUserInput('');
        setFeedback(null);
        setSavingStatus('idle'); // 저장 상태 초기화
        
        // 문제 중복 방지 인덱스 초기화 및 첫 문제 공급
        const firstIndex = selectUniqueProblemIndex([]);
        setUsedProblemIndexes([firstIndex]);
        const prob = PROBLEM_POOL[firstIndex];
        const dividend = parseFloat((prob.q * prob.d).toFixed(3));
        setCurrentQuestion({
          dividend,
          divisor: prob.d,
          quotient: prob.q,
          note: prob.note
        });

        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              endGame();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      // 중복되지 않는 문제 인덱스 추적 선택기
      const selectUniqueProblemIndex = (usedList) => {
        if (usedList.length >= PROBLEM_POOL.length) {
          usedList = []; // 모든 문제를 순회했다면 초기화 후 순환
        }
        const availableIndexes = [];
        for (let i = 0; i < PROBLEM_POOL.length; i++) {
          if (!usedList.includes(i)) {
            availableIndexes.push(i);
          }
        }
        const randomIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
        return randomIndex;
      };

      const nextRandomQuestion = () => {
        const nextIndex = selectUniqueProblemIndex(usedProblemIndexes);
        setUsedProblemIndexes(prev => [...prev, nextIndex]);
        
        const prob = PROBLEM_POOL[nextIndex];
        const dividend = parseFloat((prob.q * prob.d).toFixed(3));
        
        setCurrentQuestion({
          dividend,
          divisor: prob.d,
          quotient: prob.q,
          note: prob.note
        });
        setUserInput('');
      };

      const submitAnswer = () => {
        if (feedback !== null || userInput.trim() === '') return;

        const cleanInput = userInput.replace(/\s+/g, '');
        const studentAnswer = parseFloat(cleanInput);
        const actualAnswer = currentQuestion.quotient;
        const isCorrect = Math.abs(studentAnswer - actualAnswer) < 0.0001; 
        
        setTotalQuestionsAnswered(prev => prev + 1);

        if (isCorrect) {
          sfx.playCorrect();
          setCorrectAnswersCount(prev => prev + 1);
          const nextCombo = currentCombo + 1;
          setCurrentCombo(nextCombo);
          if (nextCombo > maxCombo) setMaxCombo(nextCombo);
          
          if (nextCombo >= 3) {
            sfx.playCombo(nextCombo);
            setComboPop(true);
            setTimeout(() => setComboPop(false), 800);
          }
          setFeedback({ status: 'correct', answer: actualAnswer });
          setTimeout(() => {
            setFeedback(null);
            setQuestionIndex(prev => (prev === 10 ? 1 : prev + 1));
            nextRandomQuestion();
          }, 900);
        } else {
          sfx.playWrong();
          setShaking(true);
          setTimeout(() => setShaking(false), 500);
          setCurrentCombo(0);
          setFeedback({ status: 'wrong', answer: actualAnswer });
          setTimeout(() => {
            setFeedback(null);
            setQuestionIndex(prev => (prev === 10 ? 1 : prev + 1));
            nextRandomQuestion();
          }, 1800);
        }
      };

      const endGame = () => {
        sfx.playTimeout();
        setScreen('result');
        if (timerRef.current) clearInterval(timerRef.current);
      };

      // 플레이 결과 제출 자동 기록
      useEffect(() => {
        if (screen === 'result') {
          sendToGoogleSheets();
        }
      }, [screen]);

      const sendToGoogleSheets = async () => {
        if (!GOOGLE_SHEET_URL) return;
        setSavingStatus('saving');
        try {
          // 구글 앱스 스크립트 'doPost'의 명세 형식에 정확히 맞춘 객체 전달
          const payload = {
            grade: grade + "학년",
            classNum: classNum + "반",
            name: studentName.trim(),
            correctCount: Number(correctAnswersCount), 
            maxCombo: Number(maxCombo),                 
            totalQuestions: Number(totalQuestionsAnswered) 
          };
          
          // 전송 성공 보장을 위해 백그라운드 킵어라이브 요청 설정
          await fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            keepalive: true 
          });
          setSavingStatus('success');
        } catch (error) {
          console.error("데이터 저장 스크립트 도중 예외가 우회 처리되었습니다.", error);
          setSavingStatus('error');
        }
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (screen !== 'play') return;
          if (e.key === 'Enter') submitAnswer();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [screen, userInput, currentQuestion, feedback]);

      const handleKeypadPress = (val) => {
        if (feedback !== null) return;
        if (val === 'C') setUserInput('');
        else if (val === 'back') setUserInput(prev => prev.slice(0, -1));
        else if (val === '.') { if (!userInput.includes('.')) setUserInput(prev => prev + '.'); }
        else { if (userInput.length < 8) setUserInput(prev => prev + val); }
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60); const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      return (
        <div className="min-h-screen flex flex-col justify-between selection:bg-amber-400 selection:text-slate-950">
          
          {/* HEADER */}
          <header className="border-b border-emerald-800/60 bg-emerald-950/80 backdrop-blur-md sticky top-0 z-40 px-4 py-3 shadow-lg">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <div className="flex items-center space-x-3">
                <div className="bg-amber-400 p-1.5 rounded-lg shadow-inner flex items-center justify-center animate-bounce">
                  <SparklesIcon />
                </div>
                <div>
                  <h1 className="font-extrabold text-lg sm:text-xl tracking-tight text-amber-300 drop-shadow">소수 마스터 챌린지 🎒</h1>
                  <p className="text-xs text-emerald-400 hidden sm:block font-medium">초등학교 6학년 소수의 나눗셈 핵심 유형 완전 정복!</p>
                </div>
              </div>
              <button onClick={() => setIsMuted(!isMuted)} className="p-2 rounded-full hover:bg-emerald-800 transition text-emerald-300">
                {isMuted ? <VolumeXIcon /> : <Volume2Icon />}
              </button>
            </div>
          </header>

          {/* MAIN CONTAINER */}
          <main className="flex-grow flex items-center justify-center p-4">
            <div className="w-full max-w-xl bg-slate-900/95 border-2 border-emerald-500/30 rounded-[2.5rem] shadow-[0_0_50px_rgba(16,185,129,0.15)] overflow-hidden backdrop-blur-xl relative">
              
              {/* SCREEN 1: START SCREEN */}
              {screen === 'start' && (
                <div className="p-6 sm:p-10 flex flex-col items-center text-center space-y-5 animate-fade-in">
                  
                  {/* Blackboard Title Card */}
                  <div className="w-full relative bg-gradient-to-b from-emerald-850 to-emerald-950 border-[6px] border-amber-900 rounded-[2rem] p-5 shadow-2xl flex flex-col items-center justify-center">
                    <div className="absolute top-2 left-3 text-[10px] text-emerald-400/50 font-bold tracking-widest">UNIT 3. 소수의 나눗셈</div>
                    <span className="text-3xl mb-1 animate-wiggle">✏️</span>
                    <h2 className="text-3xl font-black text-amber-300 tracking-tight font-serif drop-shadow">소수 마스터 챌린지</h2>
                  </div>

                  {/* [요청사항 반영] 실시간 명예의 전당 Top 10 레이아웃 (예시 유저 제거 완료) */}
                  <div className="w-full bg-slate-950/70 border border-emerald-500/20 rounded-2xl p-4 text-left space-y-3">
                    <div className="flex justify-between items-center">
                      <h3 className="text-xs font-bold text-amber-400 tracking-wider uppercase flex items-center gap-1">
                        🏆 실시간 명예의 전당 (Top 10)
                      </h3>
                      
                      {/* 랭킹 정렬 변환 탭 버튼 */}
                      <div className="flex space-x-1 bg-slate-900 p-0.5 rounded-lg border border-emerald-950/50">
                        <button
                          type="button"
                          onClick={() => setRankingTab('correct')}
                          className={`px-2 py-1 text-[10px] font-bold rounded-md transition-all ${rankingTab === 'correct' ? 'bg-amber-400 text-emerald-950' : 'text-slate-400'}`}
                        >
                          👑 소수왕
                        </button>
                        <button
                          type="button"
                          onClick={() => setRankingTab('combo')}
                          className={`px-2 py-1 text-[10px] font-bold rounded-md transition-all ${rankingTab === 'combo' ? 'bg-orange-500 text-slate-950' : 'text-slate-400'}`}
                        >
                          🔥 콤보왕
                        </button>
                      </div>
                    </div>
                    
                    {loadingRanking ? (
                      <p className="text-xs text-slate-500 text-center py-4 animate-pulse">구글 시트에서 최신 랭킹을 읽어오는 중...</p>
                    ) : sheetLeaderboard.length === 0 ? (
                      <p className="text-xs text-slate-400/80 text-center py-4 leading-relaxed font-medium">
                        아직 등록된 랭킹 기록이 없습니다.<br/>
                        오늘 첫 번째 소수왕의 주인공이 되어보세요! 🚀
                      </p>
                    ) : (
                      <div className="space-y-1 max-h-[160px] overflow-y-auto pr-1">
                        {(() => {
                          const sortedList = [...sheetLeaderboard]
                            .sort((a, b) => {
                              if (rankingTab === 'correct') {
                                return (Number(b.correctCount) || 0) - (Number(a.correctCount) || 0);
                              } else {
                                return (Number(b.maxCombo) || 0) - (Number(a.maxCombo) || 0);
                              }
                            })
                            .slice(0, 10);

                          return sortedList.map((record, index) => {
                            let medal = "";
                            if (index === 0) medal = "🥇 ";
                            else if (index === 1) medal = "🥈 ";
                            else if (index === 2) medal = "🥉 ";
                            else medal = `${index + 1}등 `;

                            return (
                              <div key={index} className="flex justify-between items-center px-3 py-1.5 rounded-lg text-xs bg-slate-900/50 border border-emerald-900/30">
                                <div className="flex items-center space-x-2 truncate">
                                  <span className="font-extrabold text-amber-400 w-8">{medal}</span>
                                  <span className="text-slate-200 truncate font-semibold">{record.grade} {record.classNum} {record.name}</span>
                                </div>
                                <div className="font-mono font-bold">
                                  {rankingTab === 'correct' ? (
                                    <span className="text-emerald-400">{record.correctCount || 0}문제</span>
                                  ) : (
                                    <span className="text-orange-400">{record.maxCombo || 0}콤보</span>
                                  )}
                                </div>
                              </div>
                            );
                          });
                        })()}
                      </div>
                    )}
                  </div>

                  {/* STUDENT INFO INPUT */}
                  <div className="w-full space-y-3 bg-slate-950/50 p-4 rounded-2xl border border-emerald-900/40">
                    <div className="grid grid-cols-3 gap-2">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 mb-1 text-center">학년</label>
                        <select value={grade} onChange={(e) => setGrade(e.target.value)} className="w-full px-2 py-2.5 bg-slate-900 border border-emerald-800/60 rounded-xl text-sm font-bold text-slate-100 text-center">
                          <option value="6">6학년</option><option value="5">5학년</option><option value="4">4학년</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 mb-1 text-center">반</label>
                        <input type="text" pattern="[0-9]*" inputMode="numeric" maxLength={2} value={classNum} onChange={(e) => setClassNum(e.target.value.replace(/[^0-9]/g, ''))} placeholder="예: 3" className="w-full px-2 py-2.5 bg-slate-900 border border-emerald-800/60 rounded-xl text-sm font-bold text-slate-100 text-center focus:ring-2 focus:ring-amber-400/50" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-400 mb-1 text-center">이름</label>
                        <input type="text" maxLength={8} value={studentName} onChange={(e) => setStudentName(e.target.value)} placeholder="이름" className="w-full px-2 py-2.5 bg-slate-900 border border-emerald-800/60 rounded-xl text-sm font-bold text-slate-100 text-center focus:ring-2 focus:ring-amber-400/50" />
                      </div>
                    </div>
                  </div>

                  {/* CHALLENGE TIMER MODE */}
                  <div className="w-full space-y-2 bg-slate-950/50 p-3 rounded-2xl border border-emerald-900/40">
                    <div className="grid grid-cols-2 gap-3">
                      <button type="button" onClick={() => setGameDuration(60)} className={`py-2.5 px-3 rounded-xl font-bold text-xs transition-all flex flex-col items-center justify-center gap-0.5 ${gameDuration === 60 ? 'bg-amber-400 text-emerald-950 ring-4 ring-amber-300/40 font-extrabold' : 'bg-slate-900 border border-emerald-850 text-slate-400'}`}>
                        <span>⚡ 1분 스피드런</span>
                      </button>
                      <button type="button" onClick={() => setGameDuration(180)} className={`py-2.5 px-3 rounded-xl font-bold text-xs transition-all flex flex-col items-center justify-center gap-0.5 ${gameDuration === 180 ? 'bg-amber-400 text-emerald-950 ring-4 ring-amber-300/40 font-extrabold' : 'bg-slate-900 border border-emerald-850 text-slate-400'}`}>
                        <span>🔥 3분 정규전</span>
                      </button>
                    </div>
                  </div>

                  {/* Play Button */}
                  <button onClick={startCountdown} className="w-full py-4 bg-gradient-to-r from-amber-400 to-yellow-300 hover:from-amber-300 hover:to-yellow-200 text-emerald-950 text-xl font-black rounded-[1.25rem] shadow-lg transform active:scale-95 transition-all flex items-center justify-center space-x-2">
                    <PlayIcon /><span>도전 시작하기! 🎯</span>
                  </button>
                </div>
              )}

              {/* SCREEN 2: COUNTDOWN */}
              {screen === 'countdown' && (
                <div className="p-12 flex flex-col items-center justify-center space-y-4 min-h-[350px]">
                  <div className="text-slate-400 uppercase tracking-widest text-sm font-semibold">Ready?</div>
                  <div className="text-8xl font-black text-amber-300 animate-bounce scale-110 drop-shadow">{countdown}</div>
                  <div className="text-lg text-emerald-400 font-medium">나의 연산 한계를 깨워보세요!</div>
                </div>
              )}

              {/* SCREEN 3: PLAYING */}
              {screen === 'play' && currentQuestion && (
                <div className={`p-5 space-y-4 transition-transform ${shaking ? 'animate-shake' : ''}`}>
                  {/* Status Bar */}
                  <div className="flex justify-between items-center bg-slate-950/75 p-3.5 rounded-2xl border border-emerald-900/40">
                    <div className="flex items-center space-x-2">
                      <ClockIcon /><span className={`font-mono text-xl font-extrabold ${timeLeft < 20 ? 'text-rose-500 animate-pulse' : 'text-slate-100'}`}>{formatTime(timeLeft)}</span>
                    </div>
                    <div className="flex items-center space-x-2">
                      <span className="text-xs text-slate-400 bg-slate-900 px-2 py-1 rounded-md">정답: <span className="font-bold text-amber-300">{correctAnswersCount}</span></span>
                      <span className="text-xs text-slate-400 bg-slate-900 px-2 py-1 rounded-md">진행: <span className="font-bold text-emerald-400">{questionIndex} / 10</span></span>
                    </div>
                  </div>

                  {/* Progressive Bar */}
                  <div className="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-1000 ${timeLeft < 20 ? 'bg-rose-500' : 'bg-gradient-to-r from-emerald-500 to-amber-400'}`} style={{ width: `${(timeLeft / gameDuration) * 100}%` }} />
                  </div>

                  {/* Combo Flag */}
                  <div className="h-10 flex items-center justify-center">
                    {currentCombo > 0 && (
                      <div className={`flex items-center space-x-1 px-4 py-1.5 rounded-full bg-orange-500/10 border border-orange-500/30 text-orange-400 ${comboPop ? 'animate-bounce scale-110' : ''} transition-all`}>
                        <FlameIcon /><span className="font-black text-base tracking-wider">{currentCombo} COMBO!</span>
                      </div>
                    )}
                  </div>

                  {/* PROBLEM SCREEN (유형 라벨 비노출) */}
                  <div className="relative bg-slate-950 border border-emerald-800/40 rounded-2xl p-6 flex flex-col items-center justify-center shadow-inner min-h-[140px]">
                    <div className="text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-100 flex items-center space-x-3 mt-4 font-mono">
                      <span>{currentQuestion.dividend}</span><span className="text-amber-400 text-3xl sm:text-4xl">÷</span><span>{currentQuestion.divisor}</span><span className="text-slate-400 text-3xl sm:text-4xl">=</span>
                      <div className={`px-4 py-1.5 rounded-2xl border-2 min-w-[100px] text-center ${feedback?.status === 'correct' ? 'border-emerald-500 bg-emerald-950/20 text-emerald-400' : feedback?.status === 'wrong' ? 'border-rose-500 bg-rose-950/20 text-rose-400' : 'border-amber-400 bg-slate-900 text-amber-300'}`}>
                        {userInput === '' ? <span className="text-slate-600 font-mono text-3xl">?</span> : <span className="font-mono text-3xl sm:text-4xl">{userInput}</span>}
                      </div>
                    </div>
                    <div className="mt-5 text-xs text-slate-400 text-center max-w-sm font-semibold">{currentQuestion.note}</div>
                  </div>

                  {/* FEEDBACK MSG */}
                  {feedback && (
                    <div className={`p-3 rounded-xl border text-center font-bold text-sm transition-all duration-300 ${feedback.status === 'correct' ? 'bg-emerald-950/80 border-emerald-500 text-emerald-300 animate-scaleUp' : 'bg-rose-950/80 border-rose-500 text-rose-300 animate-shake'}`}>
                      {feedback.status === 'correct' ? <span>✨ 딩동댕! 아주 훌륭해요!</span> : <div className="flex flex-col items-center justify-center"><span>❌ 아쉽군요! 연속 콤보가 초기화되었습니다.</span><span className="text-xs text-slate-300 mt-1">올바른 정답은 <strong className="text-amber-300 font-extrabold">{feedback.answer}</strong> 입니다.</span></div>}
                    </div>
                  )}

                  {/* Custom Touch Pad */}
                  <div className="bg-slate-950/60 p-3 rounded-2xl border border-emerald-900/30">
                    <div className="grid grid-cols-4 gap-2">
                      {[
                        { val: '1', label: '1' }, { val: '2', label: '2' }, { val: '3', label: '3' }, { val: 'back', label: '⌫', className: 'bg-rose-950/85 text-rose-300 border-rose-900/30 hover:bg-rose-900' },
                        { val: '4', label: '4' }, { val: '5', label: '5' }, { val: '6', label: '6' }, { val: 'C', label: '지움', className: 'bg-slate-800 text-slate-300 text-xs font-bold' },
                        { val: '7', label: '7' }, { val: '8', label: '8' }, { val: '9', label: '9' }, { val: 'submit', label: '확인 ↵', className: 'row-span-2 bg-amber-400 text-emerald-950 font-extrabold text-lg' },
                        { val: '0', label: '0', className: 'col-span-2' }, { val: '.', label: '.' }
                      ].map((key, i) => (
                        <button key={i} type="button" onClick={() => key.val === 'submit' ? submitAnswer() : handleKeypadPress(key.val)} className={`py-3.5 rounded-xl font-mono text-xl border transition-all active:scale-95 flex items-center justify-center shadow-sm ${key.className || 'bg-slate-900 border-emerald-950 text-slate-100'}`}>{key.label}</button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* SCREEN 4: END & RESULTS */}
              {screen === 'result' && (
                <div className="p-6 sm:p-8 flex flex-col space-y-6 animate-scaleUp">
                  <div className="text-center space-y-2">
                    <div className="inline-flex p-3 bg-amber-400/10 border border-amber-400/30 rounded-2xl mb-1"><TrophyIcon /></div>
                    <h2 className="text-2xl sm:text-3xl font-extrabold text-amber-300">도전 완료! 🎉</h2>
                    <p className="text-sm text-slate-400"><strong className="text-teal-300">{grade}학년 {classNum}반 {studentName}</strong> 학생의 정밀 연산 보고서</p>
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-slate-950 p-4 rounded-2xl border border-emerald-900/40 text-center">
                      <div className="text-xs text-slate-400">맞춘 문제 수 (소수왕)</div>
                      <div className="text-3xl font-black text-amber-300 mt-1">{correctAnswersCount}개</div>
                      <div className="text-[10px] text-slate-500 mt-0.5">총 {totalQuestionsAnswered}문제 시도</div>
                    </div>
                    <div className="bg-slate-950 p-4 rounded-2xl border border-emerald-900/40 text-center">
                      <div className="text-xs text-slate-400">최대 정답 콤보 (콤보왕)</div>
                      <div className="text-3xl font-black text-orange-400 mt-1 flex items-center justify-center space-x-1">
                        <span className="text-xl">🔥</span><span>{maxCombo}</span>
                      </div>
                      <div className="text-[10px] text-slate-500 mt-0.5">집중력의 한계 도달!</div>
                    </div>
                  </div>

                  {/* GOOGLE SHEET SAVING STATUS UI DISPLAY */}
                  <div className="w-full">
                    {savingStatus === 'saving' && (
                      <div className="bg-amber-400/10 border border-amber-400/30 rounded-xl p-3 flex items-center justify-center space-x-2 text-xs text-amber-400 font-semibold animate-pulse">
                        <span className="inline-block w-4 h-4 border-2 border-t-transparent border-amber-400 rounded-full animate-spin"></span>
                        <span>구글 스프레드시트에 결과를 실시간 전송 중입니다... 잠시만 기다려주세요! ⏳</span>
                      </div>
                    )}
                    {savingStatus === 'success' && (
                      <div className="bg-emerald-950/60 border border-emerald-500/40 rounded-xl p-3 flex items-center justify-center space-x-2 text-xs text-emerald-400 font-bold">
                        <span>✨ 데이터가 구글 스프레드시트에 기록되었습니다! 안심하고 종료해도 좋습니다. ✅</span>
                      </div>
                    )}
                    {savingStatus === 'error' && (
                      <div className="bg-rose-950/50 border border-rose-500/30 rounded-xl p-3 flex items-center justify-center space-x-2 text-xs text-rose-300 font-semibold">
                        <span>⚠️ 시트 기록에 지연이 감지되었습니다. (재도전을 누르거나 창을 닫으셔도 백그라운드 전송은 유지됩니다!)</span>
                      </div>
                    )}
                  </div>

                  <div className="flex space-x-3">
                    <button onClick={() => setScreen('start')} className="flex-1 py-4 bg-slate-800 hover:bg-slate-700 text-slate-200 text-base font-bold rounded-2xl border border-slate-700 transition-all flex items-center justify-center space-x-2 active:scale-95">
                      <RotateCcwIcon /><span>처음 화면으로</span>
                    </button>
                    <button onClick={startGame} className="flex-1 py-4 bg-amber-400 hover:bg-amber-300 text-emerald-950 text-base font-extrabold rounded-2xl shadow-lg transition-all flex items-center justify-center active:scale-95 animate-pulse">
                      <span>🎮 다시 도전하기</span>
                    </button>
                  </div>
                </div>
              )}

            </div>
          </main>

          {/* FOOTER */}
          <footer className="text-center py-4 text-xs text-slate-500 border-t border-emerald-950/40 bg-slate-950/25">
            <div className="max-w-4xl mx-auto px-4">© 2026 소수 마스터 챌린지 - 초등 수학 연산 게미피케이션 시스템.</div>
          </footer>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
